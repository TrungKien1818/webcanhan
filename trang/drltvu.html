<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh giá điểm rèn luyện cho sinh viên TVU</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body,html{
            height:100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to RIGHT,#dfe9f3,#ffffff);

            display: flex;
            justify-content: center;
            align-items: center;                   
        }

        .login-card{
            background: white;
            width: 100%;
            max-width: 450px;
            padding:30px;
            border-radius: 10px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1); 
            text-align: center;
        }

        .logo{
            width: 80px;
            margin-bottom: 15px;
        }

        h2{
            font-size: 14px;
            color: black;
            text-transform: uppercase;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .input-box{
            position: relative;
            margin-bottom: 15px;
        }

        .input-box input{
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            outline: none;
            box-sizing: border-box;
        }

        .input-box i{
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            cursor: pointer;
        }

        .options{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .btn{
            border: none;
            border-radius: 5px;
            padding: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }

        .btn:hover{
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-primary{
            background-color: #1a3a7a;
            width: 120px;
        }

        .btn-microsoft{
            background-color: #0056b3;
            width: 100%;
        }

        .btn-lecturer{
            background-color: #c82333;
            width: 100%;
        }

        .forgot-pass{
            display: block;
            text-align: left;
            text-decoration: none;
            color: #007bff;
            margin-top: 10px;
        }

        /* LINK QUAY LẠI */
        .back-link{
            display: inline-block;
            margin-top: 15px;
            padding: 8px 12px;

            background: white;
            border-radius: 6px;

            text-decoration: none;
            color: #007bff;

            font-size: 14px;
            border: 1px solid #ddd;
        }

        .back-link:hover{
            background: #f1f1f1;
        }

        @media (max-width: 500px){
            .login-card{
                margin: 15px;
                padding: 20px;
            }

            h2{
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">

        <img src="../hinhanh/hinh9.webp" alt="TVU Logo" class="logo">

        <h2>
            PHẦN MỀM TIN HỌC <br>
            Đánh giá kết quả rèn luyện cho sinh viên chính quy <br>
            tại Đại học Trà Vinh
        </h2>

        <div class="input-box">
            <input type="text" placeholder="Email">
            <i class="fa-solid fa-envelope"></i>
        </div>

        <div class="input-box">
            <input type="password" id="password" placeholder="Mật khẩu">
            <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Nhớ mật khẩu
            </label>

            <button class="btn btn-primary">
                Đăng nhập
            </button>
        </div>

        <button class="btn btn-microsoft">
            Sinh viên (Đăng nhập bằng Email Microsoft)
        </button>

        <button class="btn btn-lecturer">
            Giảng viên (Đăng nhập bằng Email TVU)
        </button>

        <a href="#" class="forgot-pass">
            Quên mật khẩu?
        </a>

        <!-- LINK QUAY LẠI TRANG LIÊN HỆ -->
        <a href="lienhe.html" class="back-link">
            Quay lại trang liên hệ
        </a>

    </div>

    <script>
        function togglePassword(){
            const pass = document.getElementById("password");
            pass.type = (pass.type === "password") ? "text" : "password";
        }
    </script>

</body>

</html>
