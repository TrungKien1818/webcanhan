<div class="container-fluid">

      </ul>
      <br>
      <span class="input-group-btn">
        <button class="btn btn-default" type="button">
          <span class="glyphicon glyphicon-search"></span>
        </button>
      </span>
    </div>

    <div class="col-sm-9">
      <div class="panel panel-default">
        <div class="panel-heading text-center"><h1><b>Liên hệ</b></h1></div>
        <div class="panel-body">
          <p>Họ và tên: Nguyễn Trung Kiên</p>
          <p>Email: nguyentrungkien@example.com</p>
          <p>Điện thoại: 078XXXXXXX</p>

          <div class="form-group">
            <input type="text" class="form-control" id="name" placeholder="Nhập họ và tên">
          </div>
          <div class="form-group">
            <input type="email" class="form-control" id="email" placeholder="Nhập email">
          </div>
          <div class="form-group">
            <input type="tel" class="form-control" id="phone" placeholder="Nhập điện thoại">
          </div>
          <div class="form-group">
            <textarea class="form-control" id="message" rows="5" placeholder="Nhập tin nhắn"></textarea>
          </div>

          <button type="button" class="btn btn-primary" onclick="guithongtin()">Gửi</button>
          <div id="info" style="margin-top:20px;"></div>
        </div>
      </div>

    </div>

<script>
function guithongtin() {
  var name = document.getElementById("name").value.trim();
  var email = document.getElementById("email").value.trim();
  var phone = document.getElementById("phone").value.trim();
  var message = document.getElementById("message").value.trim();

  if(name === "" || email === "") {
    alert("Vui lòng nhập họ tên và email!");
    return;
  }
  if(message === "") {
    alert("Vui lòng nhập nội dung!");
    return;
  }

  document.getElementById("info").innerHTML =
    "✅ Gửi thành công!<br><br>" +
    "<b>Họ tên:</b> " + name + "<br>" +
    "<b>Email:</b> " + email + "<br>" +
    "<b>Điện thoại:</b> " + phone + "<br>" +
    "<b>Nội dung:</b> " + message;

  // Xóa form sau khi gửi (tuỳ chọn)
  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("message").value = "";
}
</script>
