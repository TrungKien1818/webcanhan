<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <!-- Khung chứa toàn bộ nội dung -->
    <div class="khung-chinh">

        <!-- Phần tiêu đề -->
        <div class="tieu-de">
            <h1>Thông tin đăng ký</h1>
        </div>

        <!-- Form nhập thông tin -->
        <form>

            <div class="nhom-form">
                <label>Họ tên:</label>
                <input type="text" placeholder="Nhập họ tên">
            </div>

            <div class="nhom-form">
                <label>Ngày sinh:</label>
                <input type="date">
            </div>

            <div class="nhom-form">
                <label>Giới tính:</label>
                <div class="gioi-tinh">
                    <input type="radio" name="gt"> Nam
                    <input type="radio" name="gt"> Nữ
                </div>
            </div>

            <div class="nhom-form">
                <label>Địa chỉ:</label>
                <input type="text" placeholder="Nhập địa chỉ">
            </div>

            <div class="nhom-form">
                <label>MSSV:</label>
                <input type="text" placeholder="Nhập mã số sinh viên">
            </div>

            <div class="nhom-form">
                <label>Lớp:</label>
                <select>
                    <option>DA25TTC</option>
                    <option>DA25TTA</option>
                    <option>DA25TTB</option>
                </select>
            </div>

            <div class="nhom-form">
                <label>Số điện thoại:</label>
                <input type="text" placeholder="Nhập số điện thoại">
            </div>

            <div class="nhom-form">
                <label>Email:</label>
                <input type="email" placeholder="Nhập email">
            </div>

            <div class="nhom-form">
                <label>Ảnh đại diện:</label>
                <input type="file">
            </div>

            <div class="nhom-form">
                <label>Sở trường:</label>
                <div class="so-truong">
                    <input type="checkbox"> Thiết kế web
                    <input type="checkbox"> Lập trình web
                    <input type="checkbox"> Thành thạo tiếng Trung
                </div>
            </div>

            <div class="nhom-form mo-ta">
                <label>Mô tả sơ lược:</label>
                <textarea></textarea>
            </div>

            <div class="nut-bam">
                <button type="reset">Hủy bỏ</button>
                <button type="submit">Đăng ký</button>
            </div>

        </form>

        <!-- NÚT QUAY LẠI -->
        <div class="khung-nut">
            <a href="lienhe.html" class="nut-lien-he">
                Quay lại trang liên hệ
            </a>
        </div>

    </div>

</body>

</html>
